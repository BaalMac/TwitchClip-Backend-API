events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------
    # Slow Loris protection — kill slow connections
    # -------------------------------------------------------
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    # -------------------------------------------------------
    # Connection and request limits per IP
    # -------------------------------------------------------
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_zone  $binary_remote_addr zone=req_limit:10m rate=30r/m;

    # -------------------------------------------------------
    # Request size limits — prevents large payload attacks
    # -------------------------------------------------------
    client_max_body_size    1m;
    client_body_buffer_size 128k;

    server {
        listen 80;

        # Apply connection and request limits
        limit_conn conn_limit 20;
        limit_req  zone=req_limit burst=10 nodelay;

        # Hide Nginx version from scanners
        server_tokens off;

        # -------------------------------------------------------
        # Security headers
        # -------------------------------------------------------
        add_header X-Content-Type-Options  "nosniff";
        add_header X-Frame-Options         "DENY";
        add_header X-XSS-Protection        "1; mode=block";
        add_header Referrer-Policy         "strict-origin-when-cross-origin";

        # -------------------------------------------------------
        # Forward traffic to Flask API
        # -------------------------------------------------------
        location / {
            proxy_pass         http://127.0.0.1:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Kill slow upstream connections

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;  # Bump to match Gunicorn timeout

            # Gunicorn specific — disable buffering for faster responses
            proxy_buffering     off;
            proxy_redirect      off;
        }
        # If Running Without Docker Change Proxy_pass to: http://127.0.0.1:5000
        # If With Docker leave it to: http://api:5000
                # -------------------------------------------------------
        # Block common scanner paths — silent drop, no response
        # -------------------------------------------------------
        location ~* \.(php|asp|aspx|jsp|cgi)$ {
            return 444;
        }

        location ~* /(wp-admin|wp-login|phpmyadmin|admin|setup|install) {
            return 444;
        }